<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getAuth,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Firebase Config
    const firebaseConfig = {
  apiKey: "AIzaSyDf9ZUBWSLJ7b2QEMQUCo66A988AF7jXBQ",
  authDomain: "kavindusuran-29e6e.firebaseapp.com",
  projectId: "kavindusuran-29e6e",
  storageBucket: "kavindusuran-29e6e.firebasestorage.app",
  messagingSenderId: "179827689813",
  appId: "1:179827689813:web:c50bbd79659ef8f14b07dc",
  measurementId: "G-HQMHKK2JZB"
};
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    // Reset Password Function
    window.resetPassword = function(){

      let email = document.getElementById("email").value;

      // Empty Check
      if(email === ""){
        alert("Please enter your email ❌");
        return;
      }

      // Send Reset Email
      sendPasswordResetEmail(auth, email)

      .then(() => {

        alert("Password reset email sent ✔️");

      })

      .catch((error) => {

        alert(error.message);

        console.log(error);

      });

    }

  </script>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050505;
      font-family:Arial;
      overflow:hidden;
      color:white;
    }

    /* Neon Background */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(90px);
      animation:move 6s infinite alternate;
    }

    body::before{
      background:#ff1493;
      top:10%;
      left:10%;
    }

    body::after{
      background:#00f7ff;
      bottom:10%;
      right:10%;
    }

    @keyframes move{
      0%{
        transform:translate(0,0);
      }
      100%{
        transform:translate(60px,-60px);
      }
    }

    .box{
      position:relative;
      z-index:1;
      width:320px;
      background:rgba(0,0,0,0.6);
      padding:25px;
      border-radius:15px;
      border:2px solid #ff1493;
      box-shadow:0 0 20px #ff1493;
      backdrop-filter:blur(10px);
      text-align:center;
    }

    h2{
      color:#ff1493;
      margin-bottom:15px;
    }

    p{
      color:#ccc;
      font-size:14px;
      margin-bottom:20px;
    }

    input{
      width:92%;
      padding:12px;
      margin-top:12px;
      border:none;
      outline:none;
      border-radius:8px;
      background:#111;
      color:white;
      font-size:15px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:18px;
      border:none;
      border-radius:8px;
      background:#ff1493;
      color:white;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
    }

    button:hover{
      background:#ff4db8;
    }

    a{
      color:#00f7ff;
      text-decoration:none;
      display:block;
      margin-top:15px;
    }

  </style>

</head>

<body>

<div class="box">

  <h2>Forgot Password</h2>

  <p>
    Enter your email address and we will send you a password reset link.
  </p>

  <input type="email"
         id="email"
         placeholder="Enter Email">

  <button onclick="resetPassword()">
    Send Reset Link
  </button>

  <a href="login.html">
    Back to Login
  </a>

</div>

</body>
</html>
