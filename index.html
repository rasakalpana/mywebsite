<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050505;
      font-family:Arial;
      overflow:hidden;
      color:white;
    }

    /* Neon Background */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(90px);
      animation:move 6s infinite alternate;
    }

    body::before{
      background:#ff1493;
      top:10%;
      left:10%;
    }

    body::after{
      background:#00f7ff;
      bottom:10%;
      right:10%;
    }

    @keyframes move{
      0%{
        transform:translate(0,0);
      }
      100%{
        transform:translate(60px,-60px);
      }
    }

    .box{
      position:relative;
      z-index:1;
      width:330px;
      background:rgba(0,0,0,0.6);
      padding:30px;
      border-radius:15px;
      border:2px solid #00f7ff;
      box-shadow:0 0 20px #00f7ff;
      backdrop-filter:blur(10px);
      text-align:center;
    }

    h1{
      color:#00f7ff;
      margin-bottom:15px;
    }

    p{
      color:#ccc;
      margin-bottom:25px;
      font-size:15px;
    }

    .btn{
      display:block;
      width:100%;
      padding:13px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      text-decoration:none;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-sizing:border-box;
    }

    .login{
      background:#00f7ff;
      color:black;
    }

    .login:hover{
      background:#5ffcff;
    }

    .signup{
      background:#ff1493;
      color:white;
    }

    .signup:hover{
      background:#ff4db8;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>Welcome</h1>

  <p>
    Login or create a free account to continue
  </p>

  <!-- Login Button -->
  <a href="login.html" class="btn login">
    Login
  </a>

  <!-- Signup Button -->
  <a href="signup.html" class="btn signup">
    Sign Up Free
  </a>

</div>

</body>
</html>
